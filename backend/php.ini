; Cross-platform PHP configuration for TechBlog backend
; Windows users: if extensions fail to load, uncomment and set your PHP ext path:
; extension_dir="C:\php\ext"
; Linux/Mac: extensions are auto-discovered; no extension_dir needed.

extension=pdo_mysql
extension=mysqli
extension=openssl
extension=mbstring

display_errors=On
display_startup_errors=On
log_errors=On
error_reporting=E_ALL

date.timezone=Africa/Addis_Ababa
default_charset="UTF-8"

; File uploads (for avatar upload endpoint)
file_uploads=On
upload_max_filesize=5M
post_max_size=6M
